<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lummia Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- Falling Leaves Container -->
    <div class="leaves-container" id="leaves-container"></div>

    <!-- Capybara on Skateboard -->
    <div class="capybara-container">
        <img src="./capybara.png" alt="Capybara on skateboard" class="capybara-img">
    </div>

    <div class="container go-register">
        <!-- Login Form Starts -->
        <div class="form__container form__container-login">
            <form action="" class="form">
                <h3 class="form__heading"> Sign In</h3>
                <!-- <ul class="list list__inline list__social">
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-facebook-f"></i></a></li>
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-google-plus-g"></i></a>
                    </li>
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-linkedin-in"></i></a>
                    </li>
                </ul> -->
                <p class="form__text">use your account</p>
                <input type="email" placeholder="email" class="form__field">
                <input type="password" placeholder="password" class="form__field">
                <p class="form__text">Forgot your password?</p>
                <p class="switch-text">
                    Don't have an account?
                    <button type="button" id="go-register" class="switch-btn">
                        Sign Up
                    </button>
                </p>
            </form>
        </div>
        <!-- Login Form Ends -->
        <!-- Register Form Starts -->
        <div class="form__container form__container-register">
            <form action="" class="form">
                <h3 class="form__heading"> Create Account</h3>
                <!-- <ul class="list list__inline list__social">
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-facebook-f"></i></a></li>
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-google-plus-g"></i></a>
                    </li>
                    <li class="list__item list__social__item"><a href="#" class="list__link"><i
                                class="list__icon fab fa-linkedin-in"></i></a>
                    </li>
                </ul> -->
                <p class="form__text">use your email for registeration</p>
                <input type="text" placeholder="name" class="form__field">
                <input type="email" placeholder="email" class="form__field">
                <input type="password" placeholder="password" class="form__field">
                <p class="switch-text">
                    Already have an account?
                    <button type="button" id="go-login" class="switch-btn">
                        Sign In
                    </button>
                </p>
            </form>
        </div>
        <!-- Register Form Ends -->
        <script src="./main.js"></script>

</body>

</html>
